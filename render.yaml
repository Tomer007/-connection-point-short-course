# פריסת אתר סטטי ב-Render.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: connection-point-course
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    # ניתוב SPA: כל בקשה מוגשת מ-index.html כדי שהניווט הפנימי יעבוד.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
