# Render Blueprint — single Node service serving both frontend and API.
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: connection-point-course
    runtime: node
    buildCommand: npm install && npm run build
    startCommand: node server/index.js
    rootDir: course-app
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data/course
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: COURSE_COUPON
        sync: false
    disk:
      name: course-data
      mountPath: /var/data/course
      sizeGB: 1
